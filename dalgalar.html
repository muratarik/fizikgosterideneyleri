<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dalgalar & Ses</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  color: white;
  background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1e293b);
  background-size: 400% 400%;
  animation: gradientMove 15s ease infinite;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

nav {
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: 500;
  opacity: 0.8;
}

nav a:hover {
  opacity: 1;
}

.hero {
  text-align: center;
  padding: 70px 20px 30px;
}

.hero h1 {
  font-size: 48px;
  font-weight: 800;
  background: linear-gradient(90deg,#22c1c3,#fdbb2d);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero p {
  opacity: 0.75;
  max-width: 600px;
  margin: 15px auto;
}

.section {
  padding: 40px 20px;
  text-align: center;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
  gap: 25px;
  max-width: 1100px;
  margin: auto;
}

.card {
  padding: 35px;
  border-radius: 22px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(15px);
  transition: 0.4s ease;
  text-decoration: none;
  color: white;
  border: 1px solid rgba(255,255,255,0.1);
  text-align: left;
  position: relative;
}

.card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: 0 0 40px rgba(34,193,195,0.5);
}

.card h3 {
  margin: 0 0 10px 0;
}

.card p {
  font-size: 14px;
  opacity: 0.75;
  margin-bottom: 10px;
}

.tag {
  font-size: 13px;
  color: #67e8f9;
  font-weight: 600;
}

footer {
  text-align: center;
  padding: 40px;
  opacity: 0.6;
}

</style>
</head>

<body>

<nav>
<a href="index.html">Ana Sayfa</a>
<a href="#">Dalgalar & Ses</a>
</nav>

<div class="hero">
<h1>🌊 Dalgalar & Ses</h1>
<p>Dalga hareketleri ve ses olaylarını keşfedin.</p>
</div>

<section class="section">

<div class="cards">

<a class="card" href="doppler.html">
<h3>Doppler Etkisi</h3>
<p>Kaynak ve gözlemci hareket ettiğinde frekansın nasıl değiştiğini inceleyin.</p>
<span class="tag">Dalga Fiziği</span>
</a>

</div>

</section>

<footer>
© Fizik Gösteri Deneyleri
</footer>

</body>
</html>
